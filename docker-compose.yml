services:
  database:
    image: public.ecr.aws/docker/library/postgres:16-alpine
    container_name: pecae-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pecae_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pecae_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pecae-network

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: pecae-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pecae-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: pecae-api
    restart: always
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password123@database:5432/pecae_db?schema=public
      - DIRECT_URL=postgresql://postgres:password123@database:5432/pecae_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=super_secret_dev_key
      - PORT=3000
      - RESEND_API_KEY=re_dev_placeholder
      - EMAIL_FROM=noreply@pecae.com.br
      - STORAGE_TYPE=mock
      - SUPABASE_URL=https://placeholder.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=placeholder
      - ADMIN_SEED_EMAIL=admin@pecae.com.br
      - ADMIN_SEED_PASSWORD=Admin@pecae123
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pecae-network

  mobile-web:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
      args:
        # CRITICO: passado como ARG de build-time para ser embutido no bundle JS pelo Expo
        EXPO_PUBLIC_API_URL: http://localhost:3000/api/v1
    container_name: pecae-mobile-web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - pecae-network

volumes:
  postgres_data:
  redis_data:

networks:
  pecae-network:
    driver: bridge
